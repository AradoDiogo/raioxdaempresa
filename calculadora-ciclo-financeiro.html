<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Calculadora de Ciclo Financeiro | Raio-X da Empresa</title><meta name="robots" content="noindex,follow"><link rel="canonical" href="https://www.raioxdaempresa.com.br/calculadoras/calculadora-ciclo-financeiro.html"><meta http-equiv="refresh" content="0; url=calculadoras/calculadora-ciclo-financeiro.html">
<style>
/* Farol global para calculadoras */
.kpi.farol-verde{
  background:#e6f7ec !important;
  border:2px solid #0f7b3f !important;
  box-shadow:0 0 0 1px rgba(15,123,63,.05) inset;
}
.kpi.farol-amarelo{
  background:#fff6e0 !important;
  border:2px solid #f5b400 !important;
  box-shadow:0 0 0 1px rgba(245,180,0,.05) inset;
}
.kpi.farol-vermelho{
  background:#fdeaea !important;
  border:2px solid #e03131 !important;
  box-shadow:0 0 0 1px rgba(224,49,49,.05) inset;
}
.kpi.farol-verde .lbl,.kpi.farol-verde .sub,.kpi.farol-verde .val{color:#0f7b3f !important;}
.kpi.farol-amarelo .lbl,.kpi.farol-amarelo .sub,.kpi.farol-amarelo .val{color:#9a6a00 !important;}
.kpi.farol-vermelho .lbl,.kpi.farol-vermelho .sub,.kpi.farol-vermelho .val{color:#b00020 !important;}

#status.farol-verde, .status.farol-verde{
  background:#e6f7ec !important; color:#0f7b3f !important; border:2px solid #0f7b3f !important;
}
#status.farol-amarelo, .status.farol-amarelo{
  background:#fff6e0 !important; color:#9a6a00 !important; border:2px solid #f5b400 !important;
}
#status.farol-vermelho, .status.farol-vermelho{
  background:#fdeaea !important; color:#b00020 !important; border:2px solid #e03131 !important;
}
#status, .status{
  border-radius:10px;
}
</style>

</head><body><script>window.location.replace("calculadoras/calculadora-ciclo-financeiro.html");</script>
<script>
(function(){
  function norm(v){
    return (v || "")
      .toString()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g,"")
      .toUpperCase()
      .trim();
  }

  function classePorTexto(txt){
    const t = norm(txt);
    if(!t) return null;

    // Vermelho: situação ruim / pressão / risco
    if (
      t.includes("RISCO") ||
      t.includes("CRITIC") ||
      t.includes("PREJUIZO") ||
      t.includes("NEGATIV") ||
      t.includes("PRESSAO") ||
      t.includes("FRAGIL") ||
      t.includes("COMPRIMID") ||
      t.includes("ALAVANCAGEM ALTA")
    ) return "farol-vermelho";

    // Amarelo: intermediário / aceitável / atenção
    if (
      t.includes("ATENCAO") ||
      t.includes("ALERTA") ||
      t.includes("MODERAD") ||
      t.includes("CUIDADO") ||
      t.includes("ACEITAVEL") ||
      t.includes("INTERMEDIAR") ||
      t.includes("FUNCIONAL")
    ) return "farol-amarelo";

    // Verde: saudável / forte / folga / útil
    if (
      t.includes("SAUDAVEL") ||
      t.includes("ADEQUAD") ||
      t.includes("CONFORTAVEL") ||
      t.includes("POSITIV") ||
      t.includes("OK") ||
      t.includes("FORTE") ||
      t.includes("FOLGA") ||
      t.includes("UTIL") ||
      t.includes("BOM RETORNO") ||
      t.includes("ADMINISTRAVEL")
    ) return "farol-verde";

    return null;
  }

  function limpar(el){
    el.classList.remove("farol-verde","farol-amarelo","farol-vermelho");
  }

  function aplicarFarol(){
    document.querySelectorAll(".kpi").forEach(function(kpi){
      const lbl = kpi.querySelector(".lbl");
      if(!lbl) return;
      const lblTxt = norm(lbl.textContent);
      if(!lblTxt.includes("STATUS")) return;
      const val = kpi.querySelector(".val");
      const sub = kpi.querySelector(".sub");
      const classe = classePorTexto((val ? val.textContent : "") + " " + (sub ? sub.textContent : ""));
      limpar(kpi);
      if(classe) kpi.classList.add(classe);
    });

    document.querySelectorAll("#status, .status").forEach(function(el){
      const classe = classePorTexto(el.textContent);
      limpar(el);
      if(classe) el.classList.add(classe);
    });
  }

  document.addEventListener("DOMContentLoaded", function(){
    aplicarFarol();
    const obs = new MutationObserver(function(){
      aplicarFarol();
    });
    obs.observe(document.body, {subtree:true, childList:true, characterData:true});
    window.aplicarFarolStatus = aplicarFarol;
  });
})();
</script>

</body></html>
