<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<meta charset="utf-8"/>
<title>Simulador Financeiro para Locadoras de Equipamentos</title>
<meta content="Simulador financeiro para locadoras de equipamentos. Descubra como decisões de preço, ocupação e custos impactam o resultado financeiro da empresa." name="description"/>
<meta content="0; url=/?sim=locadora" http-equiv="refresh"/>
<link rel="preload" href="../css/style.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="preload" href="../css/style.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="../css/style.css"></noscript></noscript>
<meta content="noindex, follow" name="robots"/><link href="https://www.raioxdaempresa.com.br/?sim=locadora" rel="canonical"/>
<style>
.status-farol{padding:12px 16px;border-radius:8px;font-weight:600;text-align:center;margin-top:12px;transition:all .3s ease}
.status-verde{background:#e6f7ec;color:#0f7b3f;border:2px solid #0f7b3f}
.status-amarelo{background:#fff6e0;color:#b57a00;border:2px solid #f5b400}
.status-vermelho{background:#fdeaea;color:#b00020;border:2px solid #e03131}
</style>

</head>
<body>
<p>Redirecionando para o simulador de locadoras...</p>
<script defer="" src="../js/site.js"></script>

<script>
function aplicarFarol(){
  const els=document.querySelectorAll('#status, .status');
  els.forEach(el=>{
    const t=el.innerText.toUpperCase();
    el.classList.add('status-farol');
    el.classList.remove('status-verde','status-amarelo','status-vermelho');
    if(t.includes('RISCO')){
      el.classList.add('status-vermelho');
    }else if(t.includes('ATEN')){
      el.classList.add('status-amarelo');
    }else{
      el.classList.add('status-verde');
    }
  });
}
document.addEventListener("DOMContentLoaded",aplicarFarol);
</script>

</body>
</html>
